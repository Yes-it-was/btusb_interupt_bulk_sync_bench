[bluetooth]
service_uuid = 8f4e3d2c-7b6a-4958-a1b2-c3d4e5f60718
characteristic_uuid = 6a1f9c42-3d85-4b70-9e26-51ac7f08d3b4
local_name = DbusRepro
initial_value_hex = 00

[controller]
# btmgmt phy replaces the complete PHY selection. Keep all common BR/EDR
# modes, LE 1M TX/RX, and LE 2M TX/RX; LE Coded is intentionally absent.
phys = BR1M1SLOT, BR1M3SLOT, BR1M5SLOT, EDR2M1SLOT, EDR2M3SLOT, EDR2M5SLOT, EDR3M1SLOT, EDR3M3SLOT, EDR3M5SLOT, LE1MTX, LE1MRX, LE2MTX, LE2MRX
le_min_connection_interval = 0x0006
le_max_connection_interval = 0x000c
le_connection_latency = 0x0000
le_supervision_timeout = 0x00c8
btmgmt_timeout = 20
btmgmt_pty = auto

[server]
adapter = hci1

[client]
adapter = hci0
target_address =
address_type = public
discovery_timeout = 20
operation_timeout = 45
actions = discover-device, connect, wait-services, discover-gatt, read, write:01020304, read, disconnect, remove-device

# Optional role-specific controller values inherit from [controller].
[server.controller]

[client.controller]

[run]
attempts = 10
log_root = logs

[bluez]
service = bluetooth.service
source_config = /etc/bluetooth/main.conf
runtime_root = /run
dropin_prefix = btusb-poll-sync-repro
reverse_service_discovery = false
just_works_repairing = confirm
gatt_cache = no
delete_client_cache = true
reset_peer_bonds = true

[captures]
server_btmon = true
client_btmon = true
kernel_journal = true
bluetooth_journal = true
usbmon = true
usb_analyzer = true
unload_usbmon = false

[timeouts]
service = 20
server_ready = 20
client = 120
command = 30
analyzer = 120
capture_start_delay = 0.5
capture_stop = 5
server_stop = 5
adapter_delay = 1
between_attempts = 1
